<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note All Clipper</title>
  <style>
    :root {
      --primary-color: #3b82f6;
      --bg-color: #ffffff;
      --text-color: #1f2937;
      --secondary-text: #6b7280;
      --border-color: #e5e7eb;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--primary-color);
      border-radius: 6px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-color);
    }

    .subtitle {
      font-size: 11px;
      color: var(--secondary-text);
      margin-top: 1px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--secondary-text);
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-color: var(--primary-color);
    }

    textarea {
      height: 100px;
      resize: none;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.2s opacity;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--secondary-text);
      padding: 6px 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    .status-success { color: #10b981; }
    .status-error { color: #ef4444; }

    #settings-view { display: none; }

    #settings-view .header {
      margin-bottom: 8px;
    }

    /* 测速状态样式 */
    .speed-test-section {
      margin-top: 10px;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 6px;
    }

    .speed-test-section h4 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: var(--text-color);
    }

    .speed-result-item {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 11px;
    }

    .speed-result-item.active {
      color: var(--primary-color);
      font-weight: 600;
    }

    .speed-result-item.recommended {
      color: #059669;
    }

    .speed-result-item.failed {
      color: #ef4444;
    }

    #run-speed-test {
      font-size: 11px;
      padding: 4px 8px;
    }

    .active-url-display {
      margin-top: 6px;
      font-size: 11px;
      color: var(--primary-color);
      background: #eff6ff;
      padding: 4px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="main-view">
    <div class="header">
      <div class="logo"></div>
      <div>
        <div class="title">Note All</div>
        <div class="subtitle">碎片随手记，AI 即刻懂</div>
      </div>
    </div>

    <div class="form-group">
      <label for="note-content">记录内容</label>
      <textarea id="note-content" placeholder="输入灵感、粘贴链接或代码..."></textarea>
    </div>

    <div class="actions">
      <button id="show-settings" class="btn-secondary">⚙️ 设置</button>
      <button id="save-note" class="btn-primary">保存笔记</button>
    </div>

    <div id="status-msg" class="status"></div>
  </div>

  <div id="settings-view">
    <div class="header">
      <div class="title">扩展设置</div>
    </div>

    <!-- 服务器主地址 -->
    <div class="form-group">
      <label for="server-url">服务器地址</label>
      <input type="text" id="server-url" placeholder="http://localhost:3344">
    </div>

    <!-- 系统密码 -->
    <div class="form-group">
      <label for="api-token">系统访问密码</label>
      <input type="password" id="api-token" placeholder="sys_password">
    </div>

    <!-- 当前激活地址 -->
    <div class="active-url-display" id="active-url-display">
      当前使用: 未设置
    </div>

    <!-- 测速状态 -->
    <div class="speed-test-section" id="speed-test-section">
      <h4>地址测速结果</h4>
      <div id="speed-results"></div>
      <button id="run-speed-test" class="btn-secondary" style="margin-top: 8px;">🔄 重新测速</button>
    </div>

    <div class="actions">
      <button id="back-to-main" class="btn-secondary">返回</button>
      <button id="save-settings" class="btn-primary">保存设置</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
